<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouthCode Forms Exercise</title>
</head>
<body>
  <form action="https://formspree.io/f/xpwzpzrd" method="POST">
    <label for="first_name">First Name:</label>
    <input required type="text" id="first_name" name="first_name" placeholder="Enter your first name"/>
    <br>

    <label for="last_name">Last Name:</label>
    <input required type="text" id="last_name" name="last_name" placeholder="Enter your last name"/>
    <br>

    <label for="gender">Gender:</label>
    <select id="gender" name="gender">
      <option value="">Select your gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>
    <br>

    <label for="date_of_birth">Date of Birth:</label>
    <input required type="date" id="date_of_birth" name="date_of_birth" placeholder="DD/MM/YYYY"/>
    <br>

    <label for="email">Email:</label>
    <input required type="email" id="email" name="email" placeholder="Enter your email"/>
    <br>

    <button type="submit">Submit</button>
  </form>


<form action="https://httpbin.org/get" method="GET">
  <div>
    <label for="search_name">Search:</label>
    <input type="text" id="search_name" name="search_name">
    <button type="submit">Search Now</button>
  </div>
</form>


</body>
</html>
